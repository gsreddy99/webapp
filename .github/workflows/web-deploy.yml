name: Build WebApp (No Deploy)

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------------------------------------------------
      # .NET Build + Unit Tests
      # ---------------------------------------------------------
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore calculator-web

      - name: Build solution
        run: dotnet build calculator-web --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test calculator-web --configuration Release --no-build --verbosity normal

