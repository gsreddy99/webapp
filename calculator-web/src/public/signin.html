<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="stylesheet" href="shared.css">
</head>
<body>

<h1>Sign In</h1>

<div class="card">
    <div>
        <label>Username</label>
        <input type="text" class="dynamic-field" placeholder="Enter username">
    </div>

    <div>
        <label>Password</label>
        <input type="password" class="dynamic-field" placeholder="Enter password">
    </div>

    <button id="login-btn">Login</button>
</div>

<script src="signin.js"></script>
</body>
</html>
